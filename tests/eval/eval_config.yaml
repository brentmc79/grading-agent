metrics_to_run:
  - verify_completed
  - custom_response_quality

custom_metrics:
  - name: verify_completed
    custom_function: |
      def evaluate(instance):
          response = instance.get("response") or {}
          parts = response.get("parts", [])
          text = "".join([p.get("text", "") for p in parts if "text" in p])
          if "Evaluation Report" in text or "Total Score" in text or "Score" in text:
              return {'score': 1, 'explanation': 'Report found in final response'}
          return {'score': 0, 'explanation': 'No report found in final response'}

  - name: custom_response_quality
    prompt_template: |
      You are an expert quality assurance evaluator for an enterprise AI assistant. Your task is to evaluate the agent's final response given the user prompt and the full agent trace.
      
      The agent should have provided a detailed evaluation report for the requested repository.

      Please grade the response quality on a scale of 1 to 5:
      1 (Poor): The agent did not provide a report or it was extremely poor.
      5 (Excellent): The agent provided a detailed, well-structured report.

      User Prompt: {prompt}
      Final Response: {response}
      Return your evaluation as a valid JSON object:
      {
        "score": <integer between 1 and 5>,
        "explanation": "<rationale>"
      }
